<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Simple ToDo Application</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1040 0%, #2d1b69 50%, #0f0a2e 100%);
      min-height: 100vh;
    }

    .todo-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #fff 0%, #c4b5fd 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .todo-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 2.5rem;
    }

    .form-control-custom {
      background: rgba(255,255,255,0.08) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 12px !important;
      color: #fff !important;
      font-family: 'DM Sans', sans-serif;
      height: 48px;
      padding: 0 16px;
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-control-custom:focus {
      border-color: #a78bfa !important;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2) !important;
      background: rgba(255,255,255,0.1) !important;
      outline: none;
    }

    .form-control-custom::placeholder { color: rgba(255,255,255,0.3) !important; }

    .btn-add {
      height: 48px;
      padding: 0 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-add:hover { opacity: 0.88; color: #fff; }
    .btn-add:active { transform: scale(0.97); }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Progress */
    .progress-thin {
      height: 4px;
      border-radius: 99px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .progress-thin .progress-bar {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
    }

    .progress-label {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    /* Task cards */
    .task-card {
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(167,139,250,0.3);
    }

    .task-card:hover .task-actions { opacity: 1; }

    .task-title {
      flex: 1;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
    }

    .text-strikethrough {
      color: rgba(255,255,255,0.3) !important;
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn-action {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 0.5px solid rgba(255,255,255,0.1);
      background: transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 15px;
      text-decoration: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn-action:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-toggle:hover { background: rgba(167,139,250,0.2); color: #c4b5fd; border-color: rgba(167,139,250,0.4); }
    .btn-delete:hover { background: rgba(252,129,129,0.15); color: #fca5a5; border-color: rgba(252,129,129,0.3); }
  </style>
</head>

<body>
<div class="container py-5" style="max-width: 660px;">

  <div class="mb-4 text-center">
    <h1 class="todo-title">Simple TODO Application</h1>
    <p class="todo-sub">Stay on top of your day.</p>
  </div>

  <div class="glass-card">

    <form action="/" method="post" class="d-flex gap-2 mb-4">
      <input class="form-control form-control-custom flex-grow-1"
             type="text"
             name="title"
             placeholder="Add a new task…"
             required>
      <button type="submit" class="btn btn-add d-flex align-items-center gap-2">
        <i class="ti ti-plus"></i> Add task
      </button>
    </form>

    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="progress-thin flex-grow-1">
        <div class="progress-bar" style="width: 0%"></div>
      </div>
      <span class="progress-label">tasks pending</span>
    </div>

    <p class="section-label">Tasks</p>

    <div class="d-flex flex-column gap-2">
      <th:block th:each="task : ${tasks}">
        <div class="task-card">

          <span th:classappend="${task.completed} ? ' text-strikethrough' : ''"
                th:text="${task.title}"
                class="task-title">
            Task Title
          </span>

          <div class="task-actions">
            <a th:href="@{/{id}/toggle(id=${task.id})}"
               class="btn-action btn-toggle"
               title="Toggle">
              <i class="ti ti-check"></i>
            </a>
            <a th:href="@{/{id}/delete(id=${task.id})}"
               class="btn-action btn-delete"
               title="Delete">
              <i class="ti ti-trash"></i>
            </a>
          </div>

        </div>
      </th:block>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
